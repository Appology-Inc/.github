<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="300" viewBox="0 0 800 300">
  <defs>
    <!-- Deep immersive background -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001a05" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGlow)" rx="15" ry="15" />

  <!-- Floating Data Nodes (Particles) -->
  <g fill="#00FF41" filter="url(#neonGlow)">
    <circle cx="100" cy="350" r="2" opacity="0"><animate attributeName="cy" values="350; -50" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.6; 0" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="350" r="3" opacity="0"><animate attributeName="cy" values="350; -50" dur="12s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.8; 0" dur="12s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="350" r="1.5" opacity="0"><animate attributeName="cy" values="350; -50" dur="10s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.5; 0" dur="10s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="350" r="2.5" opacity="0"><animate attributeName="cy" values="350; -50" dur="14s" begin="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.7; 0" dur="14s" begin="4s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="350" r="2" opacity="0"><animate attributeName="cy" values="350; -50" dur="9s" begin="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.6; 0" dur="9s" begin="3s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="350" r="4" opacity="0"><animate attributeName="cy" values="350; -50" dur="15s" begin="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.4; 0" dur="15s" begin="5s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="350" r="1" opacity="0"><animate attributeName="cy" values="350; -50" dur="7s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.8; 0" dur="7s" begin="0.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Morphing Data Waves -->
  <g fill="none" stroke-width="2" filter="url(#neonGlow)">
    
    <!-- Wave 1 (Fast, subtle) -->
    <path stroke="#00FF41" opacity="0.3">
      <animate attributeName="d" 
        values="M-100,150 C100,50 300,250 500,150 S700,50 900,150;
                M-100,150 C100,250 300,50 500,150 S700,250 900,150;
                M-100,150 C100,50 300,250 500,150 S700,50 900,150" 
        dur="6s" repeatCount="indefinite" />
    </path>

    <!-- Wave 2 (Slow, sweeping) -->
    <path stroke="#00ff9d" opacity="0.2" stroke-width="1">
      <animate attributeName="d" 
        values="M-100,150 C150,250 250,50 450,150 S650,250 900,150;
                M-100,150 C150,50 250,250 450,150 S650,50 900,150;
                M-100,150 C150,250 250,50 450,150 S650,250 900,150" 
        dur="10s" repeatCount="indefinite" />
    </path>

    <!-- Wave 3 (Bold, hypnotic) -->
    <path stroke="#00a82b" opacity="0.5" stroke-width="4">
      <animate attributeName="d" 
        values="M-100,150 C200,80 400,220 600,150 S800,80 900,150;
                M-100,150 C200,220 400,80 600,150 S800,220 900,150;
                M-100,150 C200,80 400,220 600,150 S800,80 900,150" 
        dur="8s" repeatCount="indefinite" />
    </path>

  </g>

  <!-- Central Text -->
  <text x="50%" y="55%" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="80" text-anchor="middle" fill="#ffffff" filter="url(#neonGlow)" dominant-baseline="middle" letter-spacing="6">
    APPOLOGY INC.
  </text>
  
  <!-- Subtle reflection text -->
  <text x="50%" y="55%" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="80" text-anchor="middle" fill="#00FF41" opacity="0.3" dominant-baseline="middle" letter-spacing="6" transform="translate(0, 4)">
    APPOLOGY INC.
  </text>
</svg>
