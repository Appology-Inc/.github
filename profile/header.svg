<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="300">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0f1f14" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>

    <!-- Glow filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-intense">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Animated Grid Lines -->
  <g stroke="#00FF41" stroke-width="1" opacity="0.1">
    <!-- horizontal -->
    <line x1="0" y1="50" x2="1000" y2="50" />
    <line x1="0" y1="100" x2="1000" y2="100" />
    <line x1="0" y1="150" x2="1000" y2="150" />
    <line x1="0" y1="200" x2="1000" y2="200" />
    <line x1="0" y1="250" x2="1000" y2="250" />
    <!-- vertical -->
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
    <line x1="400" y1="0" x2="400" y2="300" />
    <line x1="500" y1="0" x2="500" y2="300" />
    <line x1="600" y1="0" x2="600" y2="300" />
    <line x1="700" y1="0" x2="700" y2="300" />
    <line x1="800" y1="0" x2="800" y2="300" />
    <line x1="900" y1="0" x2="900" y2="300" />
  </g>

  <!-- Left Side Data Stream -->
  <g fill="#00FF41" filter="url(#glow)" opacity="0.7">
    <rect x="50" y="-20" width="2" height="40">
      <animate attributeName="y" values="-50; 350; -50" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="3s" repeatCount="indefinite" />
    </rect>
    <rect x="150" y="350" width="4" height="20">
      <animate attributeName="y" values="350; -50; 350" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.8; 0" dur="5s" repeatCount="indefinite" />
    </rect>
    <circle cx="250" cy="0" r="3">
      <animate attributeName="cy" values="0; 300; 0" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="4s" repeatCount="indefinite" />
    </circle>
    <rect x="350" y="150" width="2" height="30">
      <animate attributeName="y" values="300; 0; 300" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.6; 0" dur="6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Right Side Data Stream -->
  <g fill="#00FF41" filter="url(#glow)" opacity="0.7">
    <rect x="850" y="-20" width="3" height="30">
      <animate attributeName="y" values="-50; 350; -50" dur="4.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="4.5s" repeatCount="indefinite" />
    </rect>
    <rect x="750" y="350" width="2" height="50">
      <animate attributeName="y" values="350; -50; 350" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.5; 0" dur="3.5s" repeatCount="indefinite" />
    </rect>
    <circle cx="950" cy="0" r="4">
      <animate attributeName="cy" values="0; 300; 0" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="6s" repeatCount="indefinite" />
    </circle>
    <rect x="650" y="-50" width="2" height="40">
      <animate attributeName="y" values="-50; 350; -50" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.7; 0" dur="5s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Cybernetic Core Orbiters (Center) -->
  <g transform="translate(500, 150)">
    <!-- Outer Ring Slow -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#00FF41" stroke-width="1" stroke-dasharray="1 10 20 5" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite" />
    </circle>
    
    <!-- Medium Ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#00FF41" stroke-width="2" stroke-dasharray="30 20 10 40" filter="url(#glow)" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4; 0.8; 0.4" dur="4s" repeatCount="indefinite" />
    </circle>
    
    <!-- Inner Rapid Ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#00FF41" stroke-width="3" stroke-dasharray="5 10 50 10" filter="url(#glow-intense)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>

    <!-- Glowing Hexagon 1 -->
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.4" filter="url(#glow)">
       <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" />
       <animate attributeName="opacity" values="0.2; 0.6; 0.2" dur="5s" repeatCount="indefinite" />
    </polygon>

    <!-- Glowing Hexagon 2 -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.6" filter="url(#glow)">
       <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite" />
    </polygon>

    <!-- Main Text -->
    <text x="0" y="12" font-family="'Courier New', Courier, monospace" font-size="46" font-weight="900" fill="#00FF41" text-anchor="middle" filter="url(#glow-intense)">
      APPOLOGY INC.
      <animate attributeName="opacity" values="1; 0.8; 1; 0.9; 1; 0.7; 1; 0.9; 1" dur="4s" repeatCount="indefinite" />
    </text>
  </g>
</svg>
