<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="shine" x1="-1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#003311" />
      <stop offset="30%" stop-color="#003311" />
      <stop offset="50%" stop-color="#00FF41" />
      <stop offset="70%" stop-color="#003311" />
      <stop offset="100%" stop-color="#003311" />
      <animate attributeName="x1" values="-2; 2" dur="5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="-1; 3" dur="5s" repeatCount="indefinite" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#090909" rx="15" ry="15"/>
  <text x="50%" y="55%" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="75" text-anchor="middle" fill="url(#shine)" filter="url(#glow)" dominant-baseline="middle" letter-spacing="4">
    APPOLOGY INC.
  </text>
</svg>
