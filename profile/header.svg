<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="300" viewBox="0 0 800 300">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#002208" />
      <stop offset="100%" stop-color="#090909" />
    </radialGradient>

    <!-- Neon Sweep for Text -->
    <linearGradient id="shine" x1="-1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#003311" />
      <stop offset="40%" stop-color="#00FF41" />
      <stop offset="60%" stop-color="#00FF41" />
      <stop offset="100%" stop-color="#003311" />
      <animate attributeName="x1" values="-2; 2" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="-1; 3" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Text Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Radar Sweep Gradient -->
    <linearGradient id="radarSweep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0" />
      <stop offset="90%" stop-color="#00FF41" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0.6" />
    </linearGradient>
    
    <!-- CRT Monitor Scanline Grid -->
    <pattern id="grid" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none" />
      <path d="M 4 0 L 0 0 0 4" fill="none" stroke="#000000" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#bgGlow)" rx="15" ry="15" />

  <!-- The Cybernetic Core (Spinning Rings) -->
  <g transform="translate(400, 150)">
    <!-- Ring 1 (Inner, Slow clockwise) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00FF41" stroke-width="1" stroke-dasharray="10 15" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </circle>
    
    <!-- Ring 2 (Middle, Fast counter-clockwise) -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#00FF41" stroke-width="2" stroke-dasharray="30 20 5 20" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite" />
    </circle>

    <!-- Ring 3 (Outer, Outer dots clockwise) -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#00FF41" stroke-width="3" stroke-dasharray="2 12" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite" />
    </circle>
    
    <!-- Ring 4 (Massive Outer Boundary) -->
    <circle cx="0" cy="0" r="240" fill="none" stroke="#00FF41" stroke-width="1" stroke-dasharray="150 50" opacity="0.2">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="40s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- The Main Text -->
  <text x="50%" y="45%" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="75" text-anchor="middle" fill="url(#shine)" filter="url(#glow)" dominant-baseline="middle" letter-spacing="4">
    APPOLOGY INC.
  </text>
  
  <text x="50%" y="65%" font-family="'Courier New', Courier, monospace" font-weight="normal" font-size="16" text-anchor="middle" fill="#00FF41" opacity="0.7" letter-spacing="8">
    SYSTEM ARCHITECTURE
  </text>

  <!-- Holographic Scanning Line (Moves Top to Bottom) -->
  <rect width="100%" height="40" fill="url(#radarSweep)" opacity="0.5">
    <animate attributeName="y" values="-40; 340" dur="3s" repeatCount="indefinite" />
  </rect>

  <!-- CRT Grid Overlay applied on top of everything to give it screen texture -->
  <rect width="100%" height="100%" fill="url(#grid)" rx="15" ry="15" pointer-events="none" />
</svg>
